{% extends 'base.html' %}

{% block title %}Page Not Found - Setlistify{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-muted mb-4">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h1 class="display-4 mb-4">404</h1>
    <h2 class="mb-4">Page Not Found</h2>
    <p class="lead mb-4">The page you're looking for doesn't exist or has been moved.</p>
    <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'home' %}" class="btn btn-primary">
            <i class="fas fa-home me-1"></i>Go Home
        </a>
        <a href="{% url 'band_list' %}" class="btn btn-outline-secondary">
            <i class="fas fa-music me-1"></i>Browse Bands
        </a>
    </div>
</div>
{% endblock %}
